name: Ad Intel Listener

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ad-intel-listener
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run listener
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_listener.py

      - name: Commit updated state
        run: |
          git config user.name "Ad Intel Bot"
          git config user.email "bot@noreply.github.com"
          git add data/telegram_offset.json data/seen_articles.json data/sources.json data/last_digest.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update listener state"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push
